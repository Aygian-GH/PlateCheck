<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PlateCheck AI</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
            }

            body{
            background:#0f172a;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
            }

            .chat-container{
            width:100%;
            max-width:1100px;
            height:90vh;
            background:rgba(255,255,255,0.05);
            backdrop-filter:blur(15px);
            border:1px solid rgba(255,255,255,0.08);
            border-radius:25px;
            display:flex;
            flex-direction:column;
            overflow:hidden;
            }

            .chat-header{
            padding:20px 30px;
            display:flex;
            align-items:center;
            gap:15px;
            border-bottom:1px solid rgba(255,255,255,0.08);
            }

            .bot-avatar{
            width:55px;
            height:55px;
            border-radius:50%;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:24px;
            }

            .header-text h2{
            color:white;
            font-size:20px;
            }

            .header-text p{
            color:#94a3b8;
            font-size:13px;
            }

            .chat-body{
            flex:1;
            overflow-y:auto;
            padding:25px;
            display:flex;
            flex-direction:column;
            gap:20px;
            }

            .message{
            max-width:70%;
            padding:15px 18px;
            border-radius:18px;
            line-height:1.6;
            }

            .bot{
            align-self:flex-start;
            background:#1e293b;
            color:white;
            }

            .user{
            align-self:flex-end;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            }

            .suggestions{
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            padding:0 25px 15px;
            }

            .suggestion-btn{
            background:#1e293b;
            color:#cbd5e1;
            border:none;
            padding:10px 15px;
            border-radius:30px;
            cursor:pointer;
            transition:.3s;
            }

            .suggestion-btn:hover{
            background:#4f46e5;
            color:white;
            }

            .chat-footer{
            padding:20px;
            border-top:1px solid rgba(255,255,255,0.08);
            }

            .input-box{
            display:flex;
            background:#1e293b;
            border-radius:50px;
            padding:10px;
            }

            .input-box input{
            flex:1;
            background:none;
            border:none;
            outline:none;
            padding:12px 18px;
            color:white;
            font-size:15px;
            }

            .send-btn{
            border:none;
            width:50px;
            height:50px;
            border-radius:50%;
            background:linear-gradient(135deg,#4f46e5,#7c3aed);
            color:white;
            cursor:pointer;
            font-size:18px;
            }

            ::-webkit-scrollbar{
            width:6px;
            }

            ::-webkit-scrollbar-thumb{
            background:#475569;
            border-radius:20px;
            }
        </style>
    </head>

    <body>
        <div class="chat-container">
            <div class="chat-header">
                <div class="bot-avatar">🤖</div>
                <div class="header-text">
                    <h2>PlateCheck AI</h2>
                    <p>Nutrition Assistant</p>
                </div>
            </div>

            <div class="chat-body">
                <div class="message bot">
                    Upload your meal image and I'll estimate calories, protein, carbs and fats.
                </div>
                <div class="message user">
                    How many calories are in 4 eggs and 2 chapatis?
                </div>
                <div class="message bot">
                    Approximately 450-500 calories with around 28g protein.
                </div>
            </div>

            <div class="chat-footer">
                <div class="input-box">
                    <input type="text" placeholder="Ask PlateCheck AI...">
                    <button class="send-btn">➜</button>
                </div>
            </div>
        </div>
    </body>
</html>
