<!DOCTYPE html>

<html lang="en">
    
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PlateCheck</title>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
        <style>
            *{margin:0;padding:0;box-sizing:border-box}
            :root{--bg:#0f1115;--card:#171a21;--text:#f5f5f5;--muted:#aaa;--border:#30343b;--accent:#1D9E75}
            body{font-family:Poppins,sans-serif;background:var(--bg);color:var(--text)}
            .navbar{display:flex;justify-content:space-between;align-items:center;padding:18px 32px;background:var(--card);border-bottom:1px solid var(--border)}
            .logo{font-size:2rem;font-weight:700}
            .nav-right{display:flex;gap:10px}
            .nb{padding:10px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);cursor:pointer}

            .hero{
            display:grid;
            grid-template-columns:500px 1fr;
            gap:90px;
            align-items:center;
            min-height:calc(100vh - 80px);
            padding:40px 90px;
            }

            .auth-card{
            margin-left:70px;
            background:var(--card);
            border:1px solid var(--border);
            border-radius:24px;
            padding:28px;
            }

            .auth-tabs{display:flex;gap:10px;margin-bottom:20px}
            .auth-tabs button{flex:1;padding:12px;border:none;border-radius:10px;cursor:pointer}
            .active{background:var(--accent);color:#fff}
            .hidden{display:none}

            .auth-card input{
            width:100%;padding:14px;margin:8px 0;
            border-radius:10px;border:1px solid var(--border);
            background:transparent;color:var(--text)
            }

            .submit-btn{
            width:100%;padding:14px;border:none;border-radius:10px;
            background:var(--accent);color:#fff;cursor:pointer;margin-top:10px
            }

            .right-side{
            display:flex;
            flex-direction:column;
            align-items:center;
            }

            .hero-image img{
            width:380px;
            height:380px;
            object-fit:cover;
            border-radius:24px;
            }

            .hero-text{
            margin-top:25px;
            max-width:550px;
            text-align:center;
            }

            .hero-text h1{
            font-size:56px;
            line-height:1.1;
            margin-bottom:15px;
            }

            .hero-text p{
            font-size:19px;
            line-height:1.8;
            color:var(--muted);
            }
        </style>
    </head>

    <body>
        <nav class="navbar">
            <div class="logo">🍽️ PlateCheck</div>
            <div class="nav-right">
                <button class="nb" onclick="window.location.href='{% url 'chatbot' %}'">Chatbot</button>
                <button class="nb" onclick="window.location.href='{% url 'dashboard' %}'">Dashboard</button>
                <button class="nb" onclick="window.location.href='{% url 'image_upload' %}'">Upload Meal</button>
                <button class="nb" onclick="window.location.href='{% url 'signup' %}'">Sign Up</button>
            </div>
        </nav>

        <div class="hero">

        <div class="auth-card">
            <div class="auth-tabs">
            <button id="loginTab" class="active" onclick="showLogin()">Login</button>
            <button id="signupTab" onclick="showSignup()">Signup</button>
            </div>

            <div id="loginForm">
            <h2>Login</h2>
            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username">
                <input type="password" name="password" placeholder="Password">
                <button class="submit-btn" type="submit">Login</button>
            </form>
            </div>

            <div id="signupForm" class="hidden">
            <h2>Create Account</h2>
            <form method="post" action="{% url 'signup' %}">
                {% csrf_token %}
                <input type="text" name="username" placeholder="Username">
                <input type="password" name="password1" placeholder="Password">
                <input type="password" name="password2" placeholder="Confirm Password">
                <button class="submit-btn" type="submit">Create Account</button>
            </form>
            </div>
        </div>

        <div class="right-side">
            <div class="hero-image">
            <img src="https://images.unsplash.com/photo-1547592180-85f173990554?w=1000">
            </div>

            <div class="hero-text">
            <h1>Know What's On Your Plate</h1>
            <p>PlateCheck helps you analyze food photos, estimate calories, track nutrition, and get AI-powered meal insights instantly.</p>
            </div>
        </div>

        </div>

        <script>
            const loginTab=document.getElementById('loginTab');
            const signupTab=document.getElementById('signupTab');

            function showLogin(){
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            }
            function showSignup(){
                signupForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
            }
        </script>
    </body>
</html>
