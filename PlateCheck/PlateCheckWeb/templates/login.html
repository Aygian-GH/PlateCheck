<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PlateCheck Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:#0f172a;display:flex;justify-content:center;align-items:center;height:100vh;margin:0}
.card{width:380px;background:#111827;padding:32px;border-radius:24px;color:white}
input{width:100%;padding:14px;margin:10px 0;border-radius:12px;border:1px solid #374151;background:#0b1220;color:white;box-sizing:border-box}
button{width:100%;padding:14px;border:none;border-radius:12px;background:#22c55e;color:white;font-weight:600}
h1{text-align:center}
</style>
</head>
<body>
<div class="card">
<h1>Login</h1>
<input type="text" placeholder="Username">
<input type="password" placeholder="Password">
<button type="button">Login</button>
</div>
</body>
</html>
